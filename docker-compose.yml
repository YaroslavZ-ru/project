version: '3.9'

services:
  api:
    image: ai-terminator:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ai-terminator-api
    restart: unless-stopped

    ports:
      - '8000:8000'

    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./configs:/app/configs:ro

    environment:
      - PYTHONUNBUFFERED=1
      - AI_LOG_LEVEL=INFO

    healthcheck:
      test: ['CMD', 'python', '-m', 'scripts.healthcheck']
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

networks:
  default:
    name: ai-terminator-net
