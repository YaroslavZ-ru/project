name: Release

'on':
  release:
    types: [published]

jobs:
  verify:
    name: "Verify before release"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest fastapi uvicorn httpx

      - name: Init and test
        run: |
          python setup_project.py
          python -m scripts.setup_all
          python -m pytest tests/ -v --tb=short
        env:
          PYTHONPATH: .

      - name: Diagnostics (healthcheck)
        run: python -m scripts.healthcheck

      - name: Report success
        run: echo "Release ${{ github.ref_name }} verified!"
