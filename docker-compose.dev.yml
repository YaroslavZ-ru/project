version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: ai-terminator-dev
    restart: 'no'

    ports:
      - '8000:8000'
      - '5678:5678'

    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./configs:/app/configs
      - ./tests:/app/tests
      - ./main.py:/app/main.py
      - ./models:/app/models:ro
      - ./data:/app/data
      - ./logs:/app/logs

    environment:
      - PYTHONUNBUFFERED=1
      - AI_LOG_LEVEL=DEBUG

    command: python -m scripts.run_api --reload
